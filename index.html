<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sweetness - Учёт реализации</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Sweetness - Учёт реализации готовой продукции</h1>

    <input type="text" id="search" placeholder="Поиск товара...">

    <h2>Добавить новый товар</h2>

    <div class="form-row">
        <input type="text" id="name" placeholder="Наименование">
        <input type="number" id="price" placeholder="Цена">
        <input type="number" id="quantity" placeholder="Количество">
        <input type="text" id="composition" placeholder="Состав">
        <input type="file" id="photo">
        <button onclick="addProduct()">Добавить</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Фото</th>
                <th>Наименование</th>
                <th>Цена (руб.)</th>
                <th>Количество</th>
                <th>Состав</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>

    <h2>Отчёт о продажах</h2>

    <select id="period">
        <option value="all">Все</option>
        <option value="day">За день</option>
        <option value="week">За неделю</option>
        <option value="month">За месяц</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Наименование</th>
                <th>Продано</th>
                <th>Общая выручка (руб.)</th>
                <th>Последняя продажа</th>
            </tr>
        </thead>
        <tbody id="reportTable"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
